<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0A0A0B"/>
  
  <!-- Outer Focus Ring -->
  <circle cx="200" cy="200" r="100" stroke="#E5E7EB" stroke-width="12" fill="none"/>
  
  <!-- Cutouts to create the precise crosshair effect -->
  <rect x="180" y="80" width="40" height="40" fill="#0A0A0B"/>
  <rect x="180" y="280" width="40" height="40" fill="#0A0A0B"/>
  <rect x="80" y="180" width="40" height="40" fill="#0A0A0B"/>
  <rect x="280" y="180" width="40" height="40" fill="#0A0A0B"/>
  
  <!-- Center Core -->
  <circle cx="200" cy="200" r="16" fill="#D6FF00"/>
  
  <!-- Technical axes / compass points -->
  <line x1="200" y1="60" x2="200" y2="80" stroke="#D6FF00" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="320" x2="200" y2="340" stroke="#4B5563" stroke-width="8" stroke-linecap="round"/>
  <line x1="60" y1="200" x2="80" y2="200" stroke="#4B5563" stroke-width="8" stroke-linecap="round"/>
  <line x1="320" y1="200" x2="340" y2="200" stroke="#4B5563" stroke-width="8" stroke-linecap="round"/>
</svg>
